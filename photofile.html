    <title>Photo Gallery</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: #f5f5f5;
      }
      h1 {
        text-align: center;
        color: #333;
      }
      .photo-gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 15px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .photo-gallery img {
        width: 100%;
        height: auto;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease;
      }
      .photo-gallery img:hover {
        transform: scale(1.05);
      }
      .back-button {
        text-align: center;
        margin-top: 30px;
      }
      .back-button a {
        padding: 10px 20px;
        background: #1a73e8;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        display: inline-block;
      }
      .back-button a:hover {
        background: #1557b0;
      }
    </style>
  </head>
